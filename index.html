<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedRose OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <a href="https://github.com/cdassapy/RedRoseOS/commits/main" class="changelog">Changelog 🔗</a>
        <div class="counter-box">
            <span id="download-count">0</span>
        </div>
    </div>

    <div class="card-container">
        <div class="download-card">
            <div class="recommended-badge">Live</div>
            
            <div class="card-header">
                <img src="logo.png" alt="RedRose OS" class="card-logo">
            </div>

            <div class="card-title">Snapshot v0.1</div>
            
            <div class="card-desc">
                Arch Linux Base. Advanced Anonymity & Cybersecurity Distribution. Volatile & Trace-Free.
            </div>

            <div class="card-controls">
                <a href="#" id="download-btn">
                    <img src="install.png" alt="Install" class="install-btn-img">
                </a>
                <span class="size">2.1G</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
